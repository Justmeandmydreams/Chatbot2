
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{display:flex;flex-direction:column;height:640px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.header{background:#0f3d8c;padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hico{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.htxt h3{color:#fff;font-size:15px;font-weight:500;margin-bottom:2px}
.htxt p{color:#aac5f5;font-size:12px}
.hbadge{margin-left:auto;background:rgba(255,255,255,0.15);color:#fff;font-size:11px;padding:4px 10px;border-radius:20px}
.setup-panel{padding:20px;display:flex;flex-direction:column;gap:12px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-shrink:0}
.setup-panel label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;display:block}
.setup-panel input{width:100%;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-family:var(--font-mono)}
.setup-panel input:focus{outline:none;border-color:#0f3d8c}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{padding:9px;background:#0f3d8c;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;transition:opacity 0.15s}
.save-btn:hover{opacity:0.85}
.notice{font-size:11px;color:var(--color-text-tertiary);text-align:center;padding:6px}
.quick-row{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:0.5px solid var(--color-border-tertiary);flex-shrink:0;scrollbar-width:none}
.quick-row::-webkit-scrollbar{display:none}
.qb{white-space:nowrap;padding:5px 11px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:all 0.15s;flex-shrink:0}
.qb:hover{background:#0f3d8c;color:#fff;border-color:#0f3d8c}
.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.u{flex-direction:row-reverse}
.bbl{max-width:75%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.b .bbl{background:var(--color-background-secondary);color:var(--color-text-primary);border-radius:4px 14px 14px 14px}
.msg.u .bbl{background:#0f3d8c;color:#fff;border-radius:14px 4px 14px 14px}
.ava{width:28px;height:28px;border-radius:50%;background:#0f3d8c;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.typing-dots{display:flex;gap:4px;padding:10px 14px;background:var(--color-background-secondary);border-radius:4px 14px 14px 14px;width:56px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--color-text-tertiary);animation:bop 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.inp-row{display:flex;gap:8px;padding:12px;border-top:0.5px solid var(--color-border-tertiary);flex-shrink:0}
.inp-row input{flex:1;padding:9px 14px;border-radius:24px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:14px;outline:none}
.inp-row input:focus{border-color:#0f3d8c}
.inp-row input:disabled{opacity:0.5}
.sbtn{width:38px;height:38px;border-radius:50%;background:#0f3d8c;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s}
.sbtn:hover{opacity:0.85}.sbtn:disabled{opacity:0.4;cursor:not-allowed}
.sbtn svg{width:15px;height:15px;fill:#fff}
.foot{font-size:11px;color:var(--color-text-tertiary);text-align:center;padding:5px;border-top:0.5px solid var(--color-border-tertiary);flex-shrink:0;background:var(--color-background-secondary)}
.cfg-toggle{margin-left:auto;background:rgba(255,255,255,0.15);color:#fff;border:none;font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer}
.err-msg{background:var(--color-background-danger);color:var(--color-text-danger);font-size:12px;padding:8px 14px;border-radius:var(--border-radius-md);margin:0 14px}
</style>

<div class="wrap">
  <div class="header">
    <div class="hico">🎓</div>
    <div class="htxt">
      <h3>College AI Assistant</h3>
      <p>Powered by Claude claude-sonnet-4-20250514</p>
    </div>
    <button class="cfg-toggle" onclick="toggleSetup()" id="cfgBtn">⚙ Config</button>
  </div>

  <div class="setup-panel" id="setupPanel">
    <div>
      <label>College Name</label>
      <input id="collegeName" placeholder="e.g. Sri Venkateswara Engineering College" />
    </div>
    <div class="setup-row">
      <div>
        <label>Location</label>
        <input id="collegeLocation" placeholder="e.g. Tiruppur, Tamil Nadu" />
      </div>
      <div>
        <label>Established Year</label>
        <input id="collegeYear" placeholder="e.g. 2001" />
      </div>
    </div>
    <div>
      <label>Courses Offered (comma separated)</label>
      <input id="collegeCourses" placeholder="B.Tech CSE, B.Tech ECE, MBA, MCA, B.Sc" />
    </div>
    <div class="setup-row">
      <div>
        <label>Annual Fee Range</label>
        <input id="collegeFees" placeholder="e.g. ₹60,000 – ₹1,20,000" />
      </div>
      <div>
        <label>Contact / Email</label>
        <input id="collegeContact" placeholder="e.g. info@college.edu" />
      </div>
    </div>
    <div>
      <label>Extra Info (placements, facilities, etc.)</label>
      <input id="collegeExtra" placeholder="e.g. 95% placement, NBA/NAAC accredited, 50-acre campus" />
    </div>
    <button class="save-btn" onclick="saveConfig()">Save & Start Chatting</button>
    <div class="notice">All data stays in your browser. Nothing is stored externally.</div>
  </div>

  <div class="quick-row" id="quickRow" style="display:none">
    <button class="qb" onclick="ask('What courses do you offer?')">Courses</button>
    <button class="qb" onclick="ask('What is the fee structure?')">Fees</button>
    <button class="qb" onclick="ask('How to apply for admission?')">Admissions</button>
    <button class="qb" onclick="ask('Tell me about placements')">Placements</button>
    <button class="qb" onclick="ask('What facilities are available on campus?')">Campus</button>
    <button class="qb" onclick="ask('What is the exam and result schedule?')">Exams</button>
    <button class="qb" onclick="ask('How can I contact the college?')">Contact</button>
    <button class="qb" onclick="ask('Tell me about scholarships available')">Scholarships</button>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="inp-row">
    <input id="chatInput" placeholder="Configure college above to start chatting..." disabled onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMsg()" />
    <button class="sbtn" id="sendBtn" onclick="sendMsg()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="foot">Calls Anthropic API directly · Your conversation stays private</div>
</div>

<script>
let collegeInfo = null;
let history = [];
let busy = false;

function toggleSetup(){
  const p = document.getElementById('setupPanel');
  const b = document.getElementById('cfgBtn');
  if(p.style.display==='none'){p.style.display='flex';b.textContent='✕ Close';}
  else{p.style.display='none';b.textContent='⚙ Config';}
}

function saveConfig(){
  const name = document.getElementById('collegeName').value.trim();
  if(!name){alert('Please enter a college name.');return;}
  collegeInfo = {
    name,
    location: document.getElementById('collegeLocation').value.trim(),
    year: document.getElementById('collegeYear').value.trim(),
    courses: document.getElementById('collegeCourses').value.trim(),
    fees: document.getElementById('collegeFees').value.trim(),
    contact: document.getElementById('collegeContact').value.trim(),
    extra: document.getElementById('collegeExtra').value.trim()
  };
  document.getElementById('setupPanel').style.display='none';
  document.getElementById('cfgBtn').textContent='⚙ Config';
  document.getElementById('quickRow').style.display='flex';
  const inp = document.getElementById('chatInput');
  inp.disabled=false;
  inp.placeholder='Ask anything about '+name+'...';
  document.getElementById('sendBtn').disabled=false;
  history=[];
  const msgs=document.getElementById('msgs');
  msgs.innerHTML='';
  addBotMsg(`Hi! I'm the AI assistant for **${name}**. I can help you with admissions, courses, fees, placements, campus facilities, and more.\n\nWhat would you like to know?`);
}

function buildSystemPrompt(){
  return `You are a friendly and knowledgeable college assistant chatbot for ${collegeInfo.name}.
${collegeInfo.location ? 'Location: '+collegeInfo.location : ''}
${collegeInfo.year ? 'Established: '+collegeInfo.year : ''}
${collegeInfo.courses ? 'Courses offered: '+collegeInfo.courses : ''}
${collegeInfo.fees ? 'Fee range: '+collegeInfo.fees : ''}
${collegeInfo.contact ? 'Contact: '+collegeInfo.contact : ''}
${collegeInfo.extra ? 'Additional info: '+collegeInfo.extra : ''}

Answer student and parent queries helpfully and warmly. Be concise (2-4 sentences unless a list is needed). Use bullet points for lists. If you don't have specific info, say "Please contact our admissions office for details." Never make up specific numbers or dates not given above.`;
}

function ask(q){
  document.getElementById('chatInput').value=q;
  sendMsg();
}

function addBotMsg(text){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg b';
  const formatted = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  d.innerHTML=`<div class="ava">🎓</div><div class="bbl">${formatted}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function addUserMsg(text){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg u';
  d.innerHTML=`<div class="bbl">${text.replace(/</g,'&lt;')}</div>`;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function showTyping(){
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='msg b';d.id='typing';
  d.innerHTML=`<div class="ava">🎓</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

function removeTyping(){
  const t=document.getElementById('typing');
  if(t)t.remove();
}

function showErr(msg){
  removeTyping();
  const msgs=document.getElementById('msgs');
  const d=document.createElement('div');
  d.className='err-msg';
  d.textContent=msg;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
}

async function sendMsg(){
  if(busy||!collegeInfo)return;
  const inp=document.getElementById('chatInput');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';
  busy=true;
  document.getElementById('sendBtn').disabled=true;
  inp.disabled=true;

  addUserMsg(text);
  history.push({role:'user',content:text});
  showTyping();

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system: buildSystemPrompt(),
        messages: history.slice(-12)
      })
    });
    const data = await res.json();
    removeTyping();
    if(data.error){
      showErr('API error: '+data.error.message);
    } else {
      const reply = data.content.map(b=>b.text||'').join('');
      history.push({role:'assistant',content:reply});
      addBotMsg(reply);
    }
  } catch(e){
    showErr('Network error. Check your connection and try again.');
  }

  busy=false;
  document.getElementById('sendBtn').disabled=false;
  inp.disabled=false;
  inp.focus();
}
</script>
